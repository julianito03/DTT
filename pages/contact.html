<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts — DTT</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div data-include="../partials/header.html" data-root="../"></div>
  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb"><a href="../index.html">Home</a> / Contacts</div>
      <h1>Contacts</h1>
      <p>Get in touch with the DTT team.</p>
    </div>
  </section>
  <section class="block">
    <div class="container">

      <div class="contact-grid">
        <div>
          <h2 style="color:var(--blue)">Send us a message</h2>
          <form onsubmit="alert(&quot;This is a demo form.&quot;);return false;">
            <div class="form-field"><label>Name</label><input type="text" required></div>
            <div class="form-field"><label>Email</label><input type="email" required></div>
            <div class="form-field"><label>Subject</label><select><option>General enquiry</option><option>Technical support</option><option>Become a partner</option></select></div>
            <div class="form-field"><label>Message</label><textarea required></textarea></div>
            <button class="btn btn-primary" type="submit">Send message</button>
          </form>
        </div>
        <div>
          <h2 style="color:var(--blue)">Headquarters</h2>
          <div class="info-row"><span class="ic">●</span><div><strong>Address</strong><br>Industrial Area, Example Street 1<br>00000 City, Country</div></div>
          <div class="info-row"><span class="ic">●</span><div><strong>Phone</strong><br>+00 000 000 0000</div></div>
          <div class="info-row"><span class="ic">●</span><div><strong>Email</strong><br>info@dtt.example</div></div>
          <div class="info-row"><span class="ic">●</span><div><strong>Hours</strong><br>Mon–Fri 8:30–17:30</div></div>
        </div>
      </div>
    </div>
  </section>
  <div data-include="../partials/footer.html" data-root="../"></div>
  <script src="../assets/js/main.js"></script>
</body>
</html>
