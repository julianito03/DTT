<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Deutsche Tor Technik</title>
  <link rel="icon" href="../assets/img/logo-square.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div data-include="../partials/header.html" data-root="../"></div>
  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb"><a href="../index.html">Home</a> / Contact</div>
      <h1>Contact</h1>
      <p>We are here to help — get in touch.</p>
    </div>
  </section>
  <section class="block">
    <div class="container">

      <div class="contact-grid">
        <div>
          <h2 style="color:var(--blue)">Send us a message</h2>
          <form onsubmit="alert(&quot;This is a demo form.&quot;);return false;">
            <div class="form-field"><label>Name</label><input type="text" required></div>
            <div class="form-field"><label>Email</label><input type="email" required></div>
            <div class="form-field"><label>Subject</label><select><option>General enquiry</option><option>Garage doors</option><option>Front doors</option><option>Service</option></select></div>
            <div class="form-field"><label>Message</label><textarea required></textarea></div>
            <button class="btn btn-primary" type="submit">Send message</button>
          </form>
        </div>
        <div>
          <h2 style="color:var(--blue)">Deutsche Tor Technik</h2>
          <div class="info-row"><span class="ic">●</span><div><strong>Address</strong><br>65510 Idstein, Germany</div></div>
          <div class="info-row"><span class="ic">●</span><div><strong>Email</strong><br><a href="mailto:info@deutsche-tor-technik.de">info@deutsche-tor-technik.de</a></div></div>
          <div class="info-row"><span class="ic">●</span><div><strong>Phone</strong><br>+49 (0) 00 000 000</div></div>
        </div>
      </div>
    </div>
  </section>
  <div data-include="../partials/footer.html" data-root="../"></div>
  <script src="../assets/js/main.js"></script>
</body>
</html>
